name: 'Web Tests - Playwright'

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC

concurrency:
  group: playwright-web-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright browsers
        run: npm run install:browsers

      - name: Run web tests - ${{ matrix.browser }}
        run: npm run test:web -- --project=${{ matrix.browser }}
        env:
          CI: 'true'

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results-web-${{ matrix.browser }}
          path: reports/junit/web-results.xml
          retention-days: 30

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-web-${{ matrix.browser }}
          path: reports/html/web
          retention-days: 30

      - name: Upload screencast on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screencast-web-${{ matrix.browser }}
          path: reports/screencast-debug
          retention-days: 7

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/junit/web-results.xml
          check_name: 'Web Tests Results - ${{ matrix.browser }}'
          comment_title: 'Web Tests - ${{ matrix.browser }}'

  merge-results:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all JUnit reports
        uses: actions/download-artifact@v4
        with:
          path: junit-artifacts

      - name: Merge JUnit results
        run: |
          npm install -g junit-report-merger
          mkdir -p reports/junit
          junit-report-merger -o reports/junit/merged-results.xml junit-artifacts/**/web-results.xml || true

      - name: Upload merged results
        uses: actions/upload-artifact@v4
        with:
          name: junit-merged-results
          path: reports/junit/merged-results.xml
          retention-days: 30
