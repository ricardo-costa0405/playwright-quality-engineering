name: 'Smoke Tests'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: playwright-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run smoke tests
        run: npm run test:smoke -- --workers=4
        env:
          CI: 'true'

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: reports/
          retention-days: 7

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            const xmlPath = 'reports/junit/web-results.xml';
            if (!fs.existsSync(xmlPath)) return;

            const xml = fs.readFileSync(xmlPath, 'utf8');

            // Parse root <testsuites> attributes
            const root = xml.match(/<testsuites[^>]*>/)?.[0] ?? '';
            const attr = (name) => {
              const m = root.match(new RegExp(`${name}="([^"]+)"`));
              return m ? m[1] : '0';
            };

            const total    = parseInt(attr('tests'),    10) || 0;
            const failures = parseInt(attr('failures'), 10) || 0;
            const errors   = parseInt(attr('errors'),   10) || 0;
            const skipped  = parseInt(attr('skipped'),  10) || 0;
            const duration = parseFloat(attr('time'))       || 0;
            const passed   = total - failures - errors - skipped;

            // Per-test durations for performance metrics
            const times = [...xml.matchAll(/<testcase\b[^>]*\btime="([\d.]+)"/g)]
              .map(m => parseFloat(m[1]))
              .filter(t => t > 0);
            const avg = times.length
              ? (times.reduce((a, b) => a + b, 0) / times.length).toFixed(2)
              : '0.00';
            const max = times.length ? Math.max(...times).toFixed(2) : '0.00';

            const badge = failures + errors === 0 ? '[PASS]' : '[FAIL]';

            const body = [
              `### Smoke Test Results  ${badge}`,
              '',
              '| Metric     | Value |',
              '|------------|-------|',
              `| Status     | ${badge} |`,
              `| Passed     | ${passed} / ${total} |`,
              `| Failed     | ${failures + errors} |`,
              `| Skipped    | ${skipped} |`,
              `| Duration   | ${duration.toFixed(2)}s |`,
              `| Avg / test | ${avg}s |`,
              `| Max / test | ${max}s |`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
