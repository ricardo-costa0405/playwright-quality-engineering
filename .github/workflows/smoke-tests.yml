name: 'Smoke Tests'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: playwright-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright browsers
        run: npm run install:browsers

      - name: Run smoke tests
        run: npm run test:smoke -- --workers=4
        env:
          CI: 'true'

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: reports/
          retention-days: 7

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            const xmlPath = 'reports/junit/web-results.xml';
            if (fs.existsSync(xmlPath)) {
              const xml = fs.readFileSync(xmlPath, 'utf8');
              const passed = (xml.match(/type="passed"/g) || []).length;
              const failed = (xml.match(/type="failed"/g) || []).length;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `### Smoke Test Results\n✅ Passed: ${passed}\n❌ Failed: ${failed}`
              });
            }
