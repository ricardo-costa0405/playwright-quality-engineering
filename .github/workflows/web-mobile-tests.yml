name: 'Web Mobile Tests - Playwright'

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * *' # Daily at 3 AM UTC

concurrency:
  group: playwright-web-mobile-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device: ['Mobile Chrome', 'Mobile Safari', 'Galaxy S21']
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright browsers
        run: npm run install:browsers

      - name: Run web mobile tests - ${{ matrix.device }}
        run: npm run test:web-mobile -- --project="${{ matrix.device }}"
        env:
          CI: 'true'

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results-web-mobile-${{ matrix.device }}
          path: reports/junit/web-mobile-results.xml
          retention-days: 30

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-web-mobile-${{ matrix.device }}
          path: reports/html/web-mobile
          retention-days: 30

      - name: Upload screencast on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screencast-web-mobile-${{ matrix.device }}
          path: reports/screencast-debug
          retention-days: 7

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/junit/web-mobile-results.xml
          check_name: 'Web Mobile Tests Results - ${{ matrix.device }}'
          comment_title: 'Web Mobile Tests - ${{ matrix.device }}'
